server {
    listen 80;
    server_name iso.imob.dev;

    # Redireciona todo o tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name iso.imob.dev;

    # ─── Cloudflare Origin CA Certificate ───────────────────────────────
    # Gere em: Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
    # Salve os arquivos em ./nginx/certs/ na instância do servidor
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # Protocolos e ciphers modernos
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Segurança ───────────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ─── Compressão ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/geo+json
        image/svg+xml;

    # ─── Proxy para o container FastAPI ──────────────────────────────────
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para consultas geoespaciais pesadas
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;

        # Buffer para respostas GeoJSON grandes
        proxy_buffer_size       16k;
        proxy_buffers           8 32k;
        proxy_busy_buffers_size 64k;
    }

    # ─── Cache de assets estáticos ────────────────────────────────────────
    location ~* \.(js|css|woff2?|png|jpg|ico|svg)$ {
        proxy_pass http://app:8000;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Health check interno (sem HTTPS) ────────────────────────────────
    location /api/health {
        proxy_pass http://app:8000/api/health;
        access_log off;
    }
}
