server {
    listen 80;
    server_name iso.imob.dev;

    # ─── Compressão ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/geo+json
        image/svg+xml;

    # ─── Segurança ───────────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ─── Proxy para o container FastAPI ──────────────────────────────────
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para consultas geoespaciais pesadas
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;

        # Buffer para respostas GeoJSON grandes
        proxy_buffer_size       16k;
        proxy_buffers           8 32k;
        proxy_busy_buffers_size 64k;
    }

    # ─── Cache de assets estáticos ────────────────────────────────────────
    location ~* \.(js|css|woff2?|png|jpg|ico|svg)$ {
        proxy_pass http://app:8000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Health check ────────────────────────────────────────────────────
    location /api/health {
        proxy_pass http://app:8000/api/health;
        access_log off;
    }
}
