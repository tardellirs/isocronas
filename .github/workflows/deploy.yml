name: 🚀 Deploy para Oracle Ampere

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite trigger manual pelo GitHub UI

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📋 Checkout do código
        uses: actions/checkout@v4

      - name: 🚀 Deploy na instância Oracle
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 18m
          script: |
            set -e
            cd ~/isocronas

            echo "📥 Commit antes do pull:"
            git log --oneline -1

            echo "📥 Sincronizando com GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "✅ Commit após pull:"
            git log --oneline -1

            echo "🐳 Build Docker..."
            docker compose build --no-cache

            echo "⬆️  Subindo containers..."
            docker compose up -d

            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído!"
            docker compose ps

      - name: 🏥 Health check pós-deploy
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://iso.imob.dev/api/health || echo "000")
          echo "Health check: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️  Health check falhou: $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Aplicação saudável!"
